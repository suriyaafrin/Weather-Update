<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="styleAge.css">
</head>

<body>
    <div class="all">
        <div class="calculator">
            <div class="day">
                <p><b>DAY</b></p>
                <input type="text" class="showDay" placeholder="DD">
            </div>
            <div class="month">
                <p><b>MONTH</b></p>
                <input type="text" class="showMonth"placeholder="MM">
            </div>
            <div class="year">
                <p><b>YEAR</b></p>
                <input type="text" class="showYear" placeholder="YYYY">
            </div>
        </div>
        <div class="line">
            <hr>
           <button class="btn"> <img src="https://cdn-icons-png.flaticon.com/128/5974/5974734.png" alt="down"></button>
        </div>
        <div class="result">
            <h1 id="demo1">_ _years</h1>
            <h1 id="demo2">_ _months</h1>
            <h1 id="demo3">_ _days</h1>
        </div>
    </div>
    <script src="appAge.js"></script>
</body>
</html>
