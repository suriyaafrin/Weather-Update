<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="logo">
      <img src="logo.svg" />
      <button class="units">
        <img
          src="https://cdn-icons-png.flaticon.com/128/3980/3980962.png"
          alt="set"
        />
        Units
        <img
          src="https://cdn-icons-png.flaticon.com/128/7996/7996254.png"
          alt="drop"
        />
      </button>
    </div>
    <h1>How's the sky looking today?</h1>
    <div class="search-bar">
      <input class="sec" type="text" placeholder="🔍Search for a place....." />
      <button class="sec_1">Search</button>
    </div>
    <div class="show1">
      <div class="show">
      <!-- <div class="images">
            <img src="bg-today-small.svg" alt="image">
        </div> -->
      <div class="left-part">
        <h4>Berlin,Germany</h4>
        <p>Tuesday, Aug 5, 2025</p>
      </div>
      <div class="right-part">
        <img class="weather_img"
          src="https://cdn-icons-png.flaticon.com/128/869/869869.png"
          alt="image"
        />
        <p><b><i>20°</i></b></p>
      </div>
    </div>
    </div>
    <div class="lower-part">
        <div class="feels">
          <p>Feels Like</p>
          <br>
          <p>18°</p>
        </div>
        <div class="humidity">
          <p>Humidity</p>
          <br>
          <p>46%</p>
        </div>
        <div class="wind">
          <p>Wind</p>
          <br>
          <p>14 km/h</p>
        </div>
        <div class="precipitation">
          <p>Precipitation</p>
          <br>
          <p>0 mm</p>
        </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
